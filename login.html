<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Faiz H Pathan</title>

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
  
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }
    .login-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 12px;
      width: 350px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .login-container h2 {
      margin-bottom: 20px;
      font-size: 1.8rem;
      color: #00d9ff;
    }
    .login-container input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      outline: none;
      font-size: 1rem;
    }
    .login-container button {
      width: 100%;
      padding: 12px;
      background: #00d9ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      margin-top: 10px;
      cursor: pointer;
      transition: 0.3s;
    }
    .login-container button:hover {
      background: #009ec9;
    }
    .login-container .links {
      margin-top: 15px;
      font-size: 0.9rem;
    }
    .login-container .links a {
      color: #ffea00;
      text-decoration: none;
    }
    .social-login {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    .social-login a {
      color: white;
      font-size: 1.6rem;
      transition: transform 0.3s, color 0.3s;
      cursor: pointer;
    }
    .social-login a:hover {
      transform: scale(1.2);
      color: #00d9ff;
    }
  </style>
</head>
<body>
  
  <div class="login-container">
    <h2>Welcome Back 👋</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <p>OR</p>

    <!-- ✅ Google icon triggers login -->
    <div class="social-login">
      <a id="googleLoginBtn"><i class="fa-brands fa-google"></i></a>
      <a href="#"><i class="fa-brands fa-github"></i></a>
    </div>

    <div class="links">
      <p>Don’t have an account? <a href="signup.html">Sign Up</a></p>
      <p><a href="#">Forgot Password?</a></p>
    </div>
  </div>

  <!-- ✅ Firebase Auth Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // ✅ Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyA6OaDz_zZec0RitJJya28T5PNobzZWy_g",
      authDomain: "myprotfolio-a70fe.firebaseapp.com",
      projectId: "myprotfolio-a70fe",
      storageBucket: "myprotfolio-a70fe.appspot.com",
      messagingSenderId: "578296764784",
      appId: "1:578296764784:web:d20ab5e59abe4986e8d7b5",
      measurementId: "G-FTFTPXXWF1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ✅ Email/Password Login
    document.querySelector("#loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.querySelector("#email").value;
      const password = document.querySelector("#password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("✅ Login successful!");
          window.location.href = "home.html";
        })
        .catch(error => alert("❌ " + error.message));
    });

    // ✅ Google Login
    const googleProvider = new GoogleAuthProvider();
    document.getElementById("googleLoginBtn").addEventListener("click", () => {
      signInWithPopup(auth, googleProvider)
        .then((result) => {
          const user = result.user;
          alert("✅ Logged in as " + user.displayName);
          window.location.href = "home.html";
        })
        .catch((error) => {
          alert("❌ Google Login Failed: " + error.message);
        });
    });
  </script>
</body>
</html>
